<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coco AI Debug</title>
<style>
  body { font-family: Arial; background: #0f172a; color: white; margin: 0; }
  h2 { padding: 10px; }
  #chat { height: 75vh; overflow-y: auto; padding: 10px; }
  .msg { margin: 8px 0; }
  .user { color: #38bdf8; }
  .ai { color: #a78bfa; }
  img { max-width: 200px; margin-top: 5px; }

  #bar { display: flex; position: fixed; bottom: 0; width: 100%; }
  input { flex: 1; padding: 12px; border: none; }
  button { padding: 12px; background: #6366f1; color: white; border: none; cursor: pointer; }
</style>
</head>
<body>

<h2>🤖 Coco AI (Debug Mode)</h2>

<div id="chat"></div>

<div id="bar">
  <input id="input" placeholder="Say something or /image prompt..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API_KEY = "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";

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = role + ": " + text;
  document.getElementById("chat").appendChild(div);
}

async function send() {
  const inputEl = document.getElementById("input");
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = "";

  addMessage("user", text);

  try {
    // IMAGE MODE
    if (text.startsWith("/image ")) {
      const prompt = text.slice(7);

      const res = await fetch("https://api.openai.com/v1/images/generations", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + API_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "gpt-image-1",
          prompt: prompt,
          size: "512x512"
        })
      });

      const raw = await res.text();
      console.log("IMAGE RAW:", raw);

      let data;
      try { data = JSON.parse(raw); } catch {}

      if (!res.ok) {
        addMessage("ai", "❌ API ERROR: " + raw);
        return;
      }

      if (data?.data?.[0]?.url) {
        const img = document.createElement("img");
        img.src = data.data[0].url;
        document.getElementById("chat").appendChild(img);
      } else {
        addMessage("ai", "⚠️ No image returned");
      }

      return;
    }

    // CHAT MODE
    const res = await fetch("https://api.openai.com/v1/responses", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "gpt-4.1-mini",
        input: text
      })
    });

    const raw = await res.text();
    console.log("CHAT RAW:", raw);

    let data;
    try {
      data = JSON.parse(raw);
    } catch {
      addMessage("ai", "❌ Invalid JSON: " + raw);
      return;
    }

    if (!res.ok) {
      addMessage("ai", "❌ API ERROR: " + raw);
      return;
    }

    let reply = "";

    if (data.output_text) {
      reply = data.output_text;
    } else if (data.output) {
      for (const item of data.output) {
        if (item.content) {
          for (const c of item.content) {
            if (c.text) reply += c.text;
          }
        }
      }
    }

    if (!reply) {
      reply = "⚠️ Empty response (check console)";
    }

    addMessage("ai", reply);

  } catch (err) {
    console.error(err);
    addMessage("ai", "❌ JS ERROR: " + err.message);
  }
}
</script>

</body>
</html>
