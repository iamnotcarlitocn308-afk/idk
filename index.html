<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coco AI</title>
<style>
  body { font-family: Arial; background: #0f172a; color: white; margin: 0; }
  #chat { height: 80vh; overflow-y: auto; padding: 10px; }
  .msg { margin: 8px 0; }
  .user { color: #38bdf8; }
  .ai { color: #a78bfa; }
  input, button { padding: 10px; border: none; }
  #bar { display: flex; }
  input { flex: 1; }
</style>
</head>
<body>

<h2 style="padding:10px;">🤖 Coco AI</h2>

<button onclick="loginWithGitHub()">Login with GitHub</button>
<p id="user"></p>

<div id="chat"></div>

<div id="bar">
  <input id="input" placeholder="Say something..." />
  <button onclick="send()">Send</button>
</div>

<input type="file" id="imageInput" />

<script>
const API_KEY = "YOUR_API_KEY_HERE"; // ⚠️ unsafe in real apps
const CLIENT_ID = "YOUR_GITHUB_CLIENT_ID";

let messages = [];

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = role + ": " + text;
  document.getElementById("chat").appendChild(div);
}

// GitHub OAuth (simple flow)
function loginWithGitHub() {
  const redirect = window.location.href;
  const url = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${redirect}&scope=read:user`;
  window.location.href = url;
}

// Handle OAuth redirect
async function handleGitHubCallback() {
  const code = new URLSearchParams(window.location.search).get("code");
  if (!code) return;

  // Normally you'd exchange code on a backend!
  document.getElementById("user").innerText = "Logged in (demo mode)";
}

handleGitHubCallback();

// Chat
async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  input.value = "";

  addMessage("user", text);

  const res = await fetch("https://api.openai.com/v1/responses", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "gpt-4.1-mini",
      input: text
    })
  });

  const data = await res.json();
  const reply = data.output[0].content[0].text;

  addMessage("ai", reply);
}

// Image generation
async function generateImage(prompt) {
  const res = await fetch("https://api.openai.com/v1/images/generations", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      prompt: prompt,
      size: "512x512"
    })
  });

  const data = await res.json();
  const img = document.createElement("img");
  img.src = data.data[0].url;
  document.getElementById("chat").appendChild(img);
}

// Image editing (very basic)
document.getElementById("imageInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const form = new FormData();
  form.append("image", file);
  form.append("prompt", "make it futuristic");

  const res = await fetch("https://api.openai.com/v1/images/edits", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY
    },
    body: form
  });

  const data = await res.json();
  const img = document.createElement("img");
  img.src = data.data[0].url;
  document.getElementById("chat").appendChild(img);
});
</script>

</body>
</html>
